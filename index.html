<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kamiurl</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #555;
    --accent: #c8f060;
    --accent-dim: #8aaa30;
    --danger: #ff5555;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 2rem 2rem 0;
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
  }

  .logo {
    font-family: var(--mono);
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .logo span {
    color: var(--muted);
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 3rem;
  }

  .hero {
    text-align: center;
  }

  .hero h1 {
    font-family: var(--mono);
    font-size: clamp(2.5rem, 8vw, 5rem);
    font-weight: 300;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text);
  }

  .hero h1 em {
    font-style: normal;
    color: var(--accent);
  }

  .hero p {
    margin-top: 1rem;
    color: var(--muted);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: var(--mono);
  }

  .shorten-box {
    width: 100%;
    max-width: 560px;
  }

  .input-row {
    display: flex;
    border: 1px solid var(--border);
    background: var(--surface);
    transition: border-color 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
  }

  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.85rem;
    padding: 1rem 1.2rem;
    font-weight: 300;
  }

  .input-row input::placeholder {
    color: var(--muted);
  }

  .input-row button {
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    padding: 0 1.4rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.03em;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .input-row button:hover {
    background: #d8ff70;
  }

  .input-row button:disabled {
    background: var(--muted);
    cursor: default;
  }

  .result {
    margin-top: 1px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: none;
    padding: 1rem 1.2rem;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .result.visible {
    display: flex;
  }

  .result-link {
    font-family: var(--mono);
    font-size: 0.85rem;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    flex: 1;
  }

  .result-link:hover {
    text-decoration: underline;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.75rem;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: var(--accent);
    color: var(--accent);
  }

  .error-msg {
    margin-top: 0.6rem;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--danger);
    display: none;
  }

  .error-msg.visible { display: block; }

  /* recents */
  .recents {
    width: 100%;
    max-width: 560px;
  }

  .recents-label {
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.7rem;
    cursor: pointer;
    text-decoration: underline;
    padding: 0;
  }

  .clear-btn:hover { color: var(--danger); }

  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .recent-item {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .recent-short {
    font-family: var(--mono);
    font-size: 0.78rem;
    color: var(--accent);
    text-decoration: none;
    flex: 0 0 auto;
    white-space: nowrap;
  }

  .recent-short:hover { text-decoration: underline; }

  .recent-arrow {
    color: var(--muted);
    font-family: var(--mono);
    font-size: 0.7rem;
    flex: 0 0 auto;
  }

  .recent-long {
    font-family: var(--mono);
    font-size: 0.72rem;
    color: var(--muted);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }

  .recent-copy {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0;
    font-family: var(--mono);
    flex: 0 0 auto;
    transition: color 0.15s;
  }

  .recent-copy:hover { color: var(--accent); }

  footer {
    padding: 1.5rem 2rem;
    text-align: center;
    font-family: var(--mono);
    font-size: 0.7rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
  }

  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1.5px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
    margin-right: 0.4rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">kami<span>url</span></div>
</header>

<main>
  <div class="hero">
    <h1>short<em>.</em><br>sharp<em>.</em></h1>
    <p>url shortener — no account needed</p>
  </div>

  <div class="shorten-box">
    <div class="input-row">
      <input type="url" id="urlInput" placeholder="https://paste-your-long-url-here.com/…" autocomplete="off" />
      <button id="shortenBtn" onclick="shorten()">shorten</button>
    </div>
    <div class="result" id="result">
      <a class="result-link" id="resultLink" href="#" target="_blank"></a>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()">copy</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="recents" id="recentsSection" style="display:none">
    <div class="recents-label">
      <span>recent links</span>
      <button class="clear-btn" onclick="clearRecents()">clear</button>
    </div>
    <div class="recent-list" id="recentList"></div>
  </div>
</main>

<footer>kamiurl · powered by firebase · <a href="go.html" style="color:inherit">resolver</a></footer>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  // ── Firebase config — same project as pantry ──
  const firebaseConfig = {
    apiKey: "AIzaSyBsWvHKxjTjuqaacmZFpYh0sikOjBsALns",
    authDomain: "pantry-e2cb3.firebaseapp.com",
    databaseURL: "https://pantry-e2cb3-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "pantry-e2cb3",
    storageBucket: "pantry-e2cb3.appspot.com",
    messagingSenderId: "1057996403862",
    appId: "1:1057996403862:web:0f6e6a5d5dc8f4ba5a98e6"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // base URL for short links — update if hosted elsewhere
  const BASE = (() => {
    const u = window.location.href;
    return u.substring(0, u.lastIndexOf('/') + 1) + 'go.html';
  })();

  function makeCode(len = 6) {
    const chars = 'abcdefghijkmnpqrstuvwxyz23456789';
    return Array.from({ length: len }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  window.shorten = async function () {
    const input = document.getElementById('urlInput');
    const btn = document.getElementById('shortenBtn');
    const errorMsg = document.getElementById('errorMsg');
    const result = document.getElementById('result');

    errorMsg.classList.remove('visible');
    result.classList.remove('visible');

    let url = input.value.trim();
    if (!url) return;

    if (!/^https?:\/\//i.test(url)) {
      url = 'https://' + url;
      input.value = url;
    }

    try { new URL(url); } catch {
      showError('that doesn\'t look like a valid url');
      return;
    }

    btn.innerHTML = '<span class="spinner"></span>';
    btn.disabled = true;

    try {
      // check for existing short code for this URL
      const indexRef = ref(db, 'kamiurl/index/' + btoa(url).replace(/[.#$/[\]]/g, '_').slice(0, 80));
      const snap = await get(indexRef);
      let code;

      if (snap.exists()) {
        code = snap.val();
      } else {
        // generate unique code
        let attempts = 0;
        do {
          code = makeCode();
          const check = await get(ref(db, 'kamiurl/links/' + code));
          if (!check.exists()) break;
          attempts++;
        } while (attempts < 10);

        await set(ref(db, 'kamiurl/links/' + code), {
          url,
          created: Date.now()
        });
        await set(indexRef, code);
      }

      const shortUrl = `${BASE}?c=${code}`;
      showResult(shortUrl, url);
      saveRecent(code, shortUrl, url);
      renderRecents();
      input.value = '';
    } catch (e) {
      showError('firebase error — check console');
      console.error(e);
    } finally {
      btn.textContent = 'shorten';
      btn.disabled = false;
    }
  };

  function showResult(shortUrl, originalUrl) {
    const link = document.getElementById('resultLink');
    const result = document.getElementById('result');
    link.href = shortUrl;
    link.textContent = shortUrl;
    result.classList.add('visible');
    document.getElementById('copyBtn').textContent = 'copy';
    document.getElementById('copyBtn').classList.remove('copied');
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  window.copyResult = function () {
    const link = document.getElementById('resultLink').href;
    navigator.clipboard.writeText(link).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
    });
  };

  // ── Recents (localStorage) ──
  function getRecents() {
    try { return JSON.parse(localStorage.getItem('kamiurl_recents') || '[]'); } catch { return []; }
  }

  function saveRecent(code, shortUrl, longUrl) {
    const recents = getRecents().filter(r => r.code !== code);
    recents.unshift({ code, shortUrl, longUrl, ts: Date.now() });
    localStorage.setItem('kamiurl_recents', JSON.stringify(recents.slice(0, 10)));
  }

  window.clearRecents = function () {
    localStorage.removeItem('kamiurl_recents');
    renderRecents();
  };

  function renderRecents() {
    const recents = getRecents();
    const section = document.getElementById('recentsSection');
    const list = document.getElementById('recentList');

    if (!recents.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';

    list.innerHTML = recents.map(r => `
      <div class="recent-item">
        <a class="recent-short" href="${r.shortUrl}" target="_blank">${r.shortUrl.split('?')[1]?.slice(2) || r.code}</a>
        <span class="recent-arrow">→</span>
        <span class="recent-long" title="${r.longUrl}">${r.longUrl}</span>
        <button class="recent-copy" title="copy" onclick="copyText('${r.shortUrl}', this)">⌘</button>
      </div>
    `).join('');
  }

  window.copyText = function (text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✓';
      setTimeout(() => { btn.textContent = '⌘'; }, 1500);
    });
  };

  // Enter key
  document.getElementById('urlInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.shorten();
  });

  // Init
  renderRecents();
</script>
</body>
</html>
